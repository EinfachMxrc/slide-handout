name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel stale runs on force-push to the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy envs so @t3-oss/env-nextjs passes at build/test time in CI. Real
  # values live in the deploy environment, never in CI.
  AUTH_SECRET: ci-dummy-secret-at-least-32-chars-long-0000
  NEXT_PUBLIC_CONVEX_URL: https://ci.convex.cloud
  CONVEX_URL: https://ci.convex.cloud
  DEMO_EMAIL: demo@example.com
  DEMO_PASSWORD: demo-password
  SENTRY_SUPPRESS_TURBOPACK_WARNING: "1"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests
        run: pnpm test

      - name: Typecheck
        run: pnpm -r typecheck
        # Convex _generated stubs currently produce type errors in UI
        # components (Doc<T> = any). Known, non-blocking until real
        # `npx convex dev` is wired — tracked in P6.
        continue-on-error: true

      - name: Lint
        run: pnpm -r lint
        continue-on-error: true

      - name: Build
        run: pnpm build

  # E2E job intentionally omitted for now. Needs a real Convex test
  # deployment to boot the Next.js server — otherwise `pnpm start`
  # hangs on the first Convex query. Revisit after P6 (API routes →
  # direct Convex) and a dedicated CI Convex deployment.
